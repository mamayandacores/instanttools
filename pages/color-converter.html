<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Converter</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input { margin: 10px 0; padding: 10px; width: 300px; }
        button { padding: 10px; }
        .result { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Color Converter</h1>
    <label for="hex">HEX Color:</label>
    <input type="text" id="hex" placeholder="#FFFFFF">
    <button onclick="convertColor()">Convert</button>
    <div class="result" id="result"></div>

    <script>
        function convertColor() {
            const hex = document.getElementById('hex').value;
            if (!/^#([0-9A-Fa-f]{3}){1,2}$/.test(hex)) {
                document.getElementById('result').innerText = 'Invalid HEX code';
                return;
            }

            let r = 0, g = 0, b = 0;
            if (hex.length === 7) {
                r = parseInt(hex.slice(1, 3), 16);
                g = parseInt(hex.slice(3, 5), 16);
                b = parseInt(hex.slice(5, 7), 16);
            } else {
                r = parseInt(hex.slice(1, 2) + hex.slice(1, 2), 16);
                g = parseInt(hex.slice(2, 3) + hex.slice(2, 3), 16);
                b = parseInt(hex.slice(3, 4) + hex.slice(3, 4), 16);
            }

            const hsl = rgbToHsl(r, g, b);
            document.getElementById('result').innerHTML = `RGB: (${r}, ${g}, ${b})<br>HSL: (${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
        }

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0; // achromatic
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }
    </script>
</body>
</html>
