<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Downloader Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Instagram Downloader Tool</h1>
        <p>Download posts, reels, and stories from Instagram.</p>
    </header>
    <main>
        <section id="download-posts">
            <h2>Download Posts</h2>
            <input type="text" placeholder="Enter post URL" id="post-url">
            <button onclick="downloadPost()">Download Post</button>
        </section>
        <section id="download-reels">
            <h2>Download Reels</h2>
            <input type="text" placeholder="Enter reel URL" id="reel-url">
            <button onclick="downloadReel()">Download Reel</button>
        </section>
        <section id="download-stories">
            <h2>Download Stories</h2>
            <input type="text" placeholder="Enter story URL" id="story-url">
            <button onclick="downloadStory()">Download Story</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Instagram Downloader Tool. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
